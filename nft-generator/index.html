<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 {
            font-size: 36px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 3s infinite;
        }
        @keyframes rainbow {
            0%,100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(360deg); }
        }
        .balance {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            font-size: 24px;
            margin: 20px 0;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab.active { background: #6c5ce7; }
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-size: 16px;
            resize: none;
            margin: 20px 0;
        }
        textarea::placeholder { color: rgba(255,255,255,0.5); }
        .styles {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .style-btn {
            padding: 15px 10px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
        }
        .style-btn.active { border-color: #6c5ce7; background: rgba(108,92,231,0.2); }
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #6c5ce7, #a855f7);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            margin: 20px 0;
            font-weight: bold;
        }
        .generate-btn:active { transform: scale(0.95); }
        .result {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .result img {
            max-width: 100%;
            border-radius: 15px;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .nft-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        .nft-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .nft-info {
            padding: 10px;
        }
        .nft-name { font-weight: bold; margin-bottom: 5px; }
        .nft-price { color: #feca57; }
        .buy-btn {
            width: 100%;
            padding: 10px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        .hidden { display: none; }
        .loading {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 NFT Generator</h1>
        </div>
        
        <div class="balance">💎 <span id="balance">1000</span> TON</div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('create')">🎨 Создать</button>
            <button class="tab" onclick="showTab('nft')">💎 Мои NFT</button>
            <button class="tab" onclick="showTab('market')">🏪 Маркет</button>
        </div>
        
        <div id="createTab">
            <textarea id="prompt" placeholder="Опишите что хотите создать...&#10;Например: Космический дракон"></textarea>
            
            <div class="styles">
                <button class="style-btn active" data-style="realistic">📸 Реализм</button>
                <button class="style-btn" data-style="anime">🎭 Аниме</button>
                <button class="style-btn" data-style="cyberpunk">🌃 Киберпанк</button>
                <button class="style-btn" data-style="fantasy">🐉 Фэнтези</button>
                <button class="style-btn" data-style="pixel">👾 Пиксель</button>
                <button class="style-btn" data-style="oil">🖼 Масло</button>
            </div>
            
            <button class="generate-btn" onclick="generate()">🎨 СОЗДАТЬ ШЕДЕВР</button>
            
            <div class="result" id="result">
                <p>Здесь появится ваше изображение</p>
            </div>
        </div>
        
        <div id="nftTab" class="hidden">
            <h2>💎 Моя коллекция</h2>
            <div class="nft-grid" id="myNfts">
                <p>У вас пока нет NFT</p>
            </div>
        </div>
        
        <div id="marketTab" class="hidden">
            <h2>🏪 Маркет NFT</h2>
            <div class="nft-grid" id="marketplace"></div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let balance = 1000;
        let currentStyle = 'realistic';
        let myNFTs = [];
        
        // Вкладки
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('#createTab, #nftTab, #marketTab').forEach(t => t.classList.add('hidden'));
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            if (tab === 'market') loadMarket();
        }
        
        // Стили
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentStyle = this.dataset.style;
            };
        });
        
        // Генерация
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            if (!prompt) { tg.showAlert('Введите описание!'); return; }
            
            document.getElementById('result').innerHTML = '<div class="loading"></div><p>Создаю...</p>';
            
            await new Promise(r => setTimeout(r, 2000));
            
            const img = `https://picsum.photos/seed/${Date.now()}/512/512`;
            
            document.getElementById('result').innerHTML = `
                <img src="${img}" alt="Generated">
                <button class="buy-btn" onclick="mint('${prompt}', '${img}')" style="margin-top:15px;">
                    💎 Минтить NFT
                </button>
            `;
        }
        
        // Минтинг
        function mint(name, img) {
            myNFTs.push({
                name: name.substring(0, 20),
                image: img,
                rarity: ['Обычный','Редкий','Эпический','Легендарный'][Math.floor(Math.random()*4)]
            });
            balance += 50;
            document.getElementById('balance').textContent = balance;
            tg.showAlert('✅ NFT создан!');
        }
        
        // Маркет
        function loadMarket() {
            const names = ['Дракон','Феникс','Единорог','Волк','Орел','Лиса','Тигр','Демон'];
            document.getElementById('marketplace').innerHTML = names.map((name, i) => `
                <div class="nft-card">
                    <img src="https://picsum.photos/seed/${name}/300/300">
                    <div class="nft-info">
                        <div class="nft-name">${name}</div>
                        <div class="nft-price">💎 ${50 + i * 30} TON</div>
                        <button class="buy-btn" onclick="buyNFT('${name}', ${50 + i * 30})">Купить</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Покупка
        function buyNFT(name, price) {
            if (balance >= price) {
                balance -= price;
                document.getElementById('balance').textContent = balance;
                tg.showAlert('✅ Куплен NFT: ' + name);
            } else {
                tg.showAlert('❌ Недостаточно средств!');
            }
        }
    </script>
</body>
</html>
