<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 32px;
            background: linear-gradient(45deg, #6c5ce7, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .balance {
            text-align: center;
            margin: 20px 0;
            font-size: 24px;
            color: #f59e0b;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            min-width: 80px;
        }
        
        .tab.active {
            background: #6c5ce7;
        }
        
        .prompt-box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        textarea {
            width: 100%;
            min-height: 100px;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            resize: vertical;
            outline: none;
            font-family: inherit;
        }
        
        textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .styles {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .style-btn {
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .style-btn.active {
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.2);
        }
        
        .generate-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, #6c5ce7, #a855f7);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            margin-bottom: 30px;
        }
        
        .generate-btn:active {
            transform: scale(0.98);
        }
        
        .result {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .result img {
            max-width: 100%;
            border-radius: 15px;
        }
        
        .loading {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .nft-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }
        
        .nft-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        
        .nft-info {
            padding: 15px;
        }
        
        .nft-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .nft-price {
            color: #f59e0b;
        }
        
        .buy-btn {
            width: 100%;
            padding: 10px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 NFT Generator</h1>
        </div>
        
        <div class="balance">💎 Баланс: <span id="balance">1000</span> TON</div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('create')">🎨 Создать</button>
            <button class="tab" onclick="showTab('nft')">💎 Мои NFT</button>
            <button class="tab" onclick="showTab('market')">🏪 Маркет</button>
        </div>
        
        <div id="createTab">
            <div class="styles" id="styles">
                <button class="style-btn active" data-style="realistic">📸 Реализм</button>
                <button class="style-btn" data-style="anime">🎭 Аниме</button>
                <button class="style-btn" data-style="cyberpunk">🌃 Киберпанк</button>
                <button class="style-btn" data-style="fantasy">🐉 Фэнтези</button>
                <button class="style-btn" data-style="pixel">👾 Пиксель</button>
                <button class="style-btn" data-style="oil">🖼 Масло</button>
            </div>
            
            <div class="prompt-box">
                <textarea id="prompt" placeholder="Опишите что хотите создать...&#10;Например: Космический дракон в неоне"></textarea>
            </div>
            
            <button class="generate-btn" onclick="generate()">
                🎨 СОЗДАТЬ ИЗОБРАЖЕНИЕ
            </button>
            
            <div class="result" id="result">
                <p style="color: rgba(255,255,255,0.5);">Здесь появится результат</p>
            </div>
        </div>
        
        <div id="nftTab" class="hidden">
            <h2 style="margin-bottom: 20px;">💎 Моя коллекция</h2>
            <div class="nft-grid" id="myNfts"></div>
        </div>
        
        <div id="marketTab" class="hidden">
            <h2 style="margin-bottom: 20px;">🏪 Маркет NFT</h2>
            <div class="nft-grid" id="marketplace"></div>
        </div>
    </div>
    
    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Состояние
        let balance = 1000;
        let currentStyle = 'realistic';
        let myNFTs = [];
        
        // Переключение вкладок
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('createTab').classList.add('hidden');
            document.getElementById('nftTab').classList.add('hidden');
            document.getElementById('marketTab').classList.add('hidden');
            
            if (tab === 'create') document.getElementById('createTab').classList.remove('hidden');
            if (tab === 'nft') document.getElementById('nftTab').classList.remove('hidden');
            if (tab === 'market') {
                document.getElementById('marketTab').classList.remove('hidden');
                loadMarketplace();
            }
        }
        
        // Выбор стиля
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentStyle = this.dataset.style;
            });
        });
        
        // Генерация
        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                tg.showAlert('Введите описание!');
                return;
            }
            
            const result = document.getElementById('result');
            result.innerHTML = '<div class="loading"></div><p>Генерирую...</p>';
            
            // Имитация генерации
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Используем picsum для демо
            const imageUrl = `https://picsum.photos/seed/${Date.now()}/512/512`;
            
            result.innerHTML = `
                <img src="${imageUrl}" alt="Generated">
                <div style="margin-top: 15px;">
                    <button class="buy-btn" onclick="mintNFT('${prompt}', '${imageUrl}')">
                        💎 Минтить NFT
                    </button>
                </div>
            `;
        }
        
        // Минтинг NFT
        function mintNFT(name, image) {
            const nft = {
                name: name.substring(0, 30),
                image: image,
                rarity: ['common', 'rare', 'epic', 'legendary'][Math.floor(Math.random() * 4)]
            };
            myNFTs.push(nft);
            updateBalance(balance + 50);
            tg.showAlert('✅ NFT создан!');
        }
        
        // Загрузка маркета
        function loadMarketplace() {
            const names = ['Dragon', 'Phoenix', 'Unicorn', 'Wolf', 'Eagle', 'Fox', 'Tiger', 'Demon'];
            const marketplace = document.getElementById('marketplace');
            
            marketplace.innerHTML = names.map(name => {
                const price = Math.floor(Math.random() * 500) + 50;
                const rarity = ['common', 'rare', 'epic', 'legendary'][Math.floor(Math.random() * 4)];
                return `
                    <div class="nft-card">
                        <img src="https://picsum.photos/seed/${name}/300/300" alt="${name}">
                        <div class="nft-info">
                            <div class="nft-name">${name}</div>
                            <div style="color: ${rarity === 'legendary' ? '#f59e0b' : '#6c5ce7'}">${rarity.toUpperCase()}</div>
                            <div class="nft-price">💎 ${price} TON</div>
                            <button class="buy-btn" onclick="buyNFT('${name}', ${price})">Купить</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Покупка NFT
        function buyNFT(name, price) {
            if (balance >= price) {
                balance -= price;
                updateBalance(balance);
                tg.showAlert(`✅ Куплен NFT: ${name}!`);
            } else {
                tg.showAlert('❌ Недостаточно средств!');
            }
        }
        
        // Обновление баланса
        function updateBalance(newBalance) {
            balance = newBalance;
            document.getElementById('balance').textContent = balance;
        }
    </script>
</body>
</html>
